
<!DOCTYPE>
<html>
    <head>
        <title>
            my music app
        </title>
        <style>
            body{
                font-family:Arial,sans-serif;
                background-color: #121212;
                color: #fff;
                margin: 0;
                padding:0;

            }
            header{
                background: color #1db954;padding:20px;
                text-align:center:center;
                font-size:24px;
                font-weight:bold;
            }
            .container{
                padding: 20px;
            }
            .song{
                display:flex;
                align-items: cenetr;
                background-color: #282828;
                margin: 10px 0;
                padding: 10px;
                border-radius:8px;

            }
            .song img{
                height:60px;
                width:60px;
                border-radius:5px;
                margin-right:15px;
            }
            .song-details{
                flex-grow:1;
            }
            .play-btn{
                background-color: #1db954;
                border:none;
                color:white;
                padding:8px 16px;
                cursor:pointer;
                border-radius:4px;
            }
            play-btn:hover{
                background-color:#17a34a;
            }
        </style>
    </head>
    <body>
        <header>
            My Music App
        </header>
        <div class="container">
            <div class="song">
                <img src="https://via.placeholder.com/60" alt="song 1">
                <div class="song-details">
                    <div>
                        <strong>Artist:</strong>
                        Arigit singh 
                        
                    </div>

                </div>
                <button class="play-btn">play </button>
                <audio id="song 1" src="https://youtu.be/kXHiIxx2atA?si=t3XCEhOta8k_6BeF"></audio>
            </div>
            <div class="song">

                <img src="https://via.placeholder.com/60" alt="song 2">
                <div class="song-details">
                    <div>
                        <strong>Track:</strong>
                        shape of you
                    </div>
                    <div><strong>Artist:</strong>Ed sheeran</div>
                </div>
                <button class="play-btn">play</button>
                <audio id="song 1" src="https://youtu.be/kXHiIxx2atA?si=t3XCEhOta8k_6BeF"></audio>
            </div>
            <div class="song">
                <img src="https://via.placeholder.com/60" alt="song 3">
                <div class="song-details">
                    <div><strong>Track:</strong>calm down</div>
                    <div><strong>Artist:</strong>Rema,selena geomez</div>
                </div>
                <button class="play-btn">play</button>
                <audio id="song 1" src="https://youtu.be/kXHiIxx2atA?si=t3XCEhOta8k_6BeF"></audio>
            </div>
        </div>
    </body>
</html>
