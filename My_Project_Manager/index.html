<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Simple Bookmark Manager</title>
	<link rel="stylesheet" href="style.css">
	<style>
		:root {
  --accent: #06b6d4;
  --bg: #f8fafc;
  --card: #ffffff;
  --muted: #64748b;
}
* {
  box-sizing: border-box;
}
body {
  font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
    "Helvetica Neue", Arial;
  margin: 0;
  background: var(--bg);
  color: #0f172a;
}
.app {
  max-width: 900px;
  margin: 36px auto;
  padding: 20px;
}
header {
  display: flex;
  align-items: center;
  gap: 16px;
}
h1 {
  margin: 0;
  font-size: 1.4rem;
}
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 18px;
  box-shadow: 0 6px 18px rgba(2, 6, 23, 0.06);
  margin-top: 18px;
}
form {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
input[type="text"] {
  flex: 1;
  min-width: 180px;
  padding: 10px;
  border: 1px solid #e6eef5;
  border-radius: 8px;
}
.controls {
  display: flex;
  gap: 8px;
}
button {
  background: var(--accent);
  color: white;
  border: 0;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
}
button.secondary {
  background: #e2f9fb;
  color: #064e53;
}
.muted {
  color: var(--muted);
  font-size: 0.9rem;
}
.bookmark-list {
  margin-top: 16px;
  display: grid;
  gap: 10px;
}
.bookmark {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #eef6f8;
}
.bookmark .left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.favicon {
  width: 36px;
  height: 36px;
  border-radius: 7px;
  background: #eef7f8;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  color: #0f172a;
}
.meta {
  display: flex;
  flex-direction: column;
}
.meta a {
  font-weight: 600;
  text-decoration: none;
  color: #0f172a;
}
.meta .url {
  font-size: 0.85rem;
  color: var(--muted);
}
.actions {
  display: flex;
  gap: 8px;
}
.small {
  padding: 6px 8px;
  border-radius: 8px;
  font-size: 0.9rem;
}
@media (max-width: 560px) {
  form {
    flex-direction: column;
  }
  .controls {
    width: 100%;
  }
}

	</style>
</head>

<body>
	<div class="app">
		<header>
			<svg width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
				<rect width="24" height="24" rx="6" fill="var(--accent)" />
				<path d="M7 11h10M7 7h10M7 15h6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"
					stroke-linejoin="round" />
			</svg>
			<div>
				<h1>Bookmark Manager</h1>
				<div class="muted">Save, open, edit and remove your favorite websites — stored locally in your browser
				</div>
			</div>
		</header>

		<div class="card">
			<form id="bookmarkForm">
				<input id="siteName" type="text" placeholder="Site name (e.g. MDN Web Docs)" required />
				<input id="siteUrl" type="text" placeholder="https://example.com" required />

				<div class="controls">
					<button id="saveBtn" type="submit">Save Bookmark</button>
					<button id="clearBtn" type="button" class="secondary">Clear All</button>
				</div>

				<div style="flex-basis:100%"></div>
				<div class="muted">Tip: You can paste URLs without <code>https://</code> — the app will normalise them.
				</div>
			</form>

			<div style="margin-top:14px">
				<input id="search" type="text" placeholder="Search bookmarks..."
					style="width:100%;padding:8px;border-radius:8px;border:1px solid #e6eef5" />
			</div>

			<div id="bookmarks" class="bookmark-list" aria-live="polite"></div>
		</div>
	</div>

	<script src="script.js">
		// LocalStorage key
const STORAGE_KEY = "bookmarks_v1";

// Elements
const form = document.getElementById("bookmarkForm");
const siteNameInput = document.getElementById("siteName");
const siteUrlInput = document.getElementById("siteUrl");
const bookmarksEl = document.getElementById("bookmarks");
const clearBtn = document.getElementById("clearBtn");
const searchInput = document.getElementById("search");
const saveBtn = document.getElementById("saveBtn");

// State
let bookmarks = [];
let editIndex = -1; // -1 => new bookmark mode

// Helpers
function loadBookmarks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    bookmarks = raw ? JSON.parse(raw) : [];
  } catch (e) {
    bookmarks = [];
  }
}

function saveBookmarks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
}

function normalizeUrl(url) {
  url = url.trim();
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;
  return url;
}

function validUrl(url) {
  try {
    new URL(url);
    return true;
  } catch (e) {
    return false;
  }
}

function faviconLetter(name) {
  return (name || "").trim().charAt(0).toUpperCase() || "?";
}

function renderBookmarks(filter = "") {
  bookmarksEl.innerHTML = "";
  const q = filter.trim().toLowerCase();
  const list = bookmarks.filter((b) => {
    if (!q) return true;
    return b.name.toLowerCase().includes(q) || b.url.toLowerCase().includes(q);
  });

  if (list.length === 0) {
    bookmarksEl.innerHTML =
      '<div class="muted" style="padding:12px">No bookmarks yet. Add one using the form above.</div>';
    return;
  }

  list.forEach((b, idx) => {
    const item = document.createElement("div");
    item.className = "bookmark";

    item.innerHTML = `
          <div class="left">
            <div class="favicon">${faviconLetter(b.name)}</div>
            <div class="meta">
              <a href="${escapeHtml(
                b.url
              )}" target="_blank" rel="noopener">${escapeHtml(b.name)}</a>
              <div class="url">${escapeHtml(b.url)}</div>
            </div>
          </div>
          <div class="actions">
            <button class="small secondary" data-edit="${idx}">Edit</button>
            <button class="small" data-open="${idx}">Open</button>
            <button class="small secondary" data-delete="${idx}">Delete</button>
          </div>
        `;

    bookmarksEl.appendChild(item);
  });
}

// Basic XSS escape for text content
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// Form submit
form.addEventListener("submit", (e) => {
  e.preventDefault();

  let name = siteNameInput.value.trim();
  let url = normalizeUrl(siteUrlInput.value);

  if (!name) {
    alert("Please provide a site name.");
    siteNameInput.focus();
    return;
  }
  if (!validUrl(url)) {
    alert("Please enter a valid URL.");
    siteUrlInput.focus();
    return;
  }

  const bookmark = { name, url };

  if (editIndex >= 0) {
    bookmarks[editIndex] = bookmark;
    editIndex = -1;
    saveBtn.textContent = "Save Bookmark";
  } else {
    bookmarks.unshift(bookmark); // newest first
  }

  saveBookmarks();
  renderBookmarks(searchInput.value);
  form.reset();
  siteNameInput.focus();
});

// Click actions (open, edit, delete)
bookmarksEl.addEventListener("click", (e) => {
  const target = e.target;
  const del = target.getAttribute("data-delete");
  const edt = target.getAttribute("data-edit");
  const opn = target.getAttribute("data-open");

  if (del !== null) {
    const idx = Number(del);
    if (confirm(`Delete "${bookmarks[idx].name}"?`)) {
      bookmarks.splice(idx, 1);
      saveBookmarks();
      renderBookmarks(searchInput.value);
    }
  }

  if (edt !== null) {
    const idx = Number(edt);
    editIndex = idx;
    siteNameInput.value = bookmarks[idx].name;
    siteUrlInput.value = bookmarks[idx].url;
    saveBtn.textContent = "Update Bookmark";
    siteNameInput.focus();
  }

  if (opn !== null) {
    const idx = Number(opn);
    window.open(bookmarks[idx].url, "_blank", "noopener");
  }
});

// Clear All
clearBtn.addEventListener("click", () => {
  if (bookmarks.length === 0) {
    alert("No bookmarks to clear.");
    return;
  }
  if (confirm("Clear all bookmarks?")) {
    bookmarks = [];
    saveBookmarks();
    renderBookmarks();
  }
});

// Search
searchInput.addEventListener("input", (e) => renderBookmarks(e.target.value));

// Initialise
loadBookmarks();
renderBookmarks();

// Accessibility: keyboard shortcut to focus name (N) and search (F)
document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "n" && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    siteNameInput.focus();
  }
  if (e.key.toLowerCase() === "f" && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    searchInput.focus();
  }
});

	</script>
</body>

</html>
